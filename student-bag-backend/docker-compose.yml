services:
  postgres:
    image: postgres:16
    container_name: student-bag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: student_bag
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - student_bag_postgres_data:/var/lib/postgresql/data
    networks:
      - student_bag_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME} -d student_bag"]
      interval: 10s
      timeout: 5s
      retries: 5

  student-bag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-bag-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}

      GOOGLE_APPLICATION_CREDENTIALS: /app/src/main/resources/firebase/student-bag-fe020-firebase-adminsdk-fbsvc-973767165c.json
      FIREBASE_STORAGE_BUCKET: ${FIREBASE_STORAGE_BUCKET}

    volumes:
      - ./src/main/resources/firebase/student-bag-fe020-firebase-adminsdk-fbsvc-973767165c.json:/app/src/main/resources/firebase/student-bag-fe020-firebase-adminsdk-fbsvc-973767165c.json:ro

    networks:
      - student_bag_network

volumes:
  student_bag_postgres_data:

networks:
  student_bag_network:
    driver: bridge